<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>面談AIアシスト</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { indigo: { 950: '#1e1b4b' } },
          boxShadow: { 'soft': '0 2px 12px rgba(0,0,0,0.06)' },
          keyframes: {
            ripple: {
              '0%': { boxShadow: '0 0 0 0 rgba(79,70,229,0.4)' },
              '100%': { boxShadow: '0 0 0 16px rgba(79,70,229,0)' }
            }
          },
          animation: { ripple: 'ripple 1.2s infinite' }
        }
      }
    };
  </script>

  <style>
    .thin-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .thin-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .thin-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .minutes-content p { margin-bottom: 0.5rem; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-800">
<div id="root" class="min-h-screen"></div>

<script type="text/babel">

const POWER_AUTOMATE_URL = "https://default3d540d42b0fd4a55b84fb51a4a6da5.a3.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8126094ed50d46aaaa2432966d2bb094/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=D75a0bzBp5bu_wnl4gkQWD12D21ahhGdFSH6OiJBDfQ";
const RECOGNITION_LANG = "ja-JP";

/* ------------------------------
   Icons
------------------------------ */
const Icon = ({name, className="w-5 h-5"}) => {
  const common = "fill-none stroke-current stroke-[1.6]";
  switch (name) {
    case "mic": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M12 1.5a3.5 3.5 0 0 1 3.5 3.5v6a3.5 3.5 0 0 1-7 0v-6A3.5 3.5 0 0 1 12 1.5z"/>
        <path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v4"/>
      </svg>
    );
    case "stop": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    );
    case "send": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    );
    case "file": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
    );
    case "copy": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    );
    case "trash": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/>
      </svg>
    );
  }
};

const Toast = ({msg, onClose}) => (
  <div className="fixed top-4 right-4 z-50">
    <div className="bg-slate-900 text-white px-4 py-2 rounded shadow-lg flex items-center gap-2 text-sm animate-in slide-in-from-top-4 duration-300">
      <span>{msg}</span>
      <button onClick={onClose} className="ml-2 hover:text-indigo-400">×</button>
    </div>
  </div>
);

/* ======================================================
   MAIN APP
====================================================== */
function App() {
  const [isRecording, setIsRecording] = React.useState(false);
  const [finalChunks, setFinalChunks] = React.useState([]);
  const [interim, setInterim] = React.useState("");
  const [suggestions, setSuggestions] = React.useState([]);
  const [minutes, setMinutes] = React.useState("");
  const [loadingAI, setLoadingAI] = React.useState(false);
  const [loadingMinutes, setLoadingMinutes] = React.useState(false);
  const [errorMsg, setErrorMsg] = React.useState("");
  const [toastMsg, setToastMsg] = React.useState("");

  const transcriptRef = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const manualStopRef = React.useRef(false);

  React.useEffect(() => {
    if (transcriptRef.current) {
      transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
    }
  }, [finalChunks, interim]);

  const ensureRecognition = React.useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    if (!recognitionRef.current) {
      const r = new SR();
      r.lang = RECOGNITION_LANG;
      r.interimResults = true;
      r.continuous = true;
      r.onresult = (e) => {
        let inter = "";
        const finals = [];
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const res = e.results[i];
          if (res.isFinal) finals.push(res[0].transcript.trim());
          else inter += res[0].transcript;
        }
        if (finals.length) setFinalChunks(p => [...p, ...finals]);
        setInterim(inter.trim());
      };
      r.onend = () => { if (!manualStopRef.current) try { r.start(); } catch {} };
      recognitionRef.current = r;
    }
    return recognitionRef.current;
  }, []);

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: true, audio: { echoCancellation: false }
      });
      if (stream.getAudioTracks().length === 0) {
        stream.getTracks().forEach(t => t.stop());
        alert("システムオーディオを共有してください。");
        return;
      }
      streamRef.current = stream;
      const r = ensureRecognition();
      manualStopRef.current = false;
      r.start();
      setIsRecording(true);
      stream.getVideoTracks()[0].onended = () => stopRecording();
    } catch (err) { console.error(err); }
  }

  function stopRecording() {
    manualStopRef.current = true;
    if (recognitionRef.current) try { recognitionRef.current.stop(); } catch {}
    if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setIsRecording(false);
  }

  const fullText = React.useMemo(() => (finalChunks.join(" ") + " " + interim).trim(), [finalChunks, interim]);

  // AIリクエスト汎用関数
  async function callPowerAutomate(type) {
    if (!fullText) { setToastMsg("文字起こしデータがありません"); return; }
    
    if (type === "suggest") setLoadingAI(true);
    else setLoadingMinutes(true);

    try {
      const res = await fetch(POWER_AUTOMATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          timestamp: new Date().toISOString(), 
          transcript: fullText,
          requestType: type // suggest または minutes
        })
      });
      if (!res.ok) throw new Error();
      const text = await res.text();
      
      if (type === "suggest") {
        setSuggestions(text.split(/\n+/).map(s => s.trim()).filter(Boolean));
      } else {
        setMinutes(text);
      }
    } catch (err) { 
      setErrorMsg("送信失敗。Power Automateの設定を確認してください。"); 
    } finally { 
      setLoadingAI(false); 
      setLoadingMinutes(false); 
    }
  }

  return (
    <div className="max-w-5xl mx-auto px-4 py-6 flex flex-col gap-6 min-h-screen">
      {toastMsg && <Toast msg={toastMsg} onClose={() => setToastMsg("")} />}

      <header className="flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-4">
        <div>
          <h1 className="text-2xl font-bold text-indigo-900 flex items-center gap-2">
            <Icon name="mic" className="w-6 h-6" /> 面談AIアシスト
          </h1>
          <p className="text-xs text-slate-500 mt-1 uppercase tracking-wider font-semibold">System Audio Recognition Enabled</p>
        </div>
        
        <div className="flex flex-wrap gap-2">
          {!isRecording ? (
            <button onClick={startRecording} className="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 transition-all">
              <Icon name="mic" className="w-4 h-4"/> 録音開始
            </button>
          ) : (
            <button onClick={stopRecording} className="relative inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-rose-600 text-white text-sm font-medium hover:bg-rose-700">
              <span className="absolute -inset-1 rounded-lg animate-ripple"></span>
              <Icon name="stop" className="w-4 h-4"/> 停止
            </button>
          )}
          <button onClick={() => callPowerAutomate("suggest")} disabled={loadingAI} className="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-indigo-100 text-indigo-700 text-sm font-medium hover:bg-indigo-200 disabled:opacity-50">
            <Icon name="send" className="w-4 h-4"/> {loadingAI ? "思考中..." : "AI質問案"}
          </button>
          <button onClick={() => callPowerAutomate("minutes")} disabled={loadingMinutes} className="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-100 text-emerald-700 text-sm font-medium hover:bg-emerald-200 disabled:opacity-50">
            <Icon name="file" className="w-4 h-4"/> {loadingMinutes ? "作成中..." : "議事録作成"}
          </button>
          <button onClick={() => {setFinalChunks([]); setInterim(""); setSuggestions([]); setMinutes("");}} className="p-2 text-slate-400 hover:text-rose-500 transition-colors">
            <Icon name="trash" className="w-5 h-5" />
          </button>
        </div>
      </header>

      <main className="flex flex-col gap-6 flex-1">
        {/* 上段: AIからの返答案 */}
        <section className="flex flex-col min-h-[200px]">
          <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3 flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-indigo-500"></span> 質問案
          </h2>
          <div className="bg-white rounded-xl shadow-soft border border-slate-200 p-4 flex-1 overflow-y-auto thin-scrollbar">
            {suggestions.length === 0 ? (
              <p className="text-slate-400 text-sm italic h-full flex items-center justify-center">AIの提案がここに表示されます</p>
            ) : (
              <div className="grid grid-cols-1 gap-2">
                {suggestions.map((s, i) => (
                  <button key={i} onClick={() => { navigator.clipboard.writeText(s); setToastMsg("コピーしました"); }} 
                    className="text-left p-3 rounded-lg border border-slate-50 bg-slate-50 hover:bg-indigo-50 transition-all flex justify-between items-center text-sm">
                    <span>{s}</span>
                    <Icon name="copy" className="w-3 h-3 text-slate-400" />
                  </button>
                ))}
              </div>
            )}
          </div>
        </section>

        {/* 中段: リアルタイム文字起こし */}
        <section className="h-40 flex flex-col">
          <h2 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3 flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${isRecording ? 'bg-red-500 animate-pulse' : 'bg-slate-300'}`}></span>
            文字起こし
          </h2>
          <div ref={transcriptRef} className="bg-slate-900 rounded-xl p-4 overflow-y-auto thin-scrollbar flex-1 font-mono text-xs leading-relaxed text-slate-400">
            {finalChunks.length === 0 && !interim ? "待機中..." : (
              <div>
                {finalChunks.map((t, i) => <span key={i} className="inline mr-2">{t}</span>)}
                {interim && <span className="text-indigo-400 border-b border-indigo-500">{interim}</span>}
              </div>
            )}
          </div>
        </section>

        {/* 下段: 議事録エリア */}
        <section className="flex flex-col min-h-[250px] mb-8">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold uppercase tracking-wider text-emerald-600 flex items-center gap-2">
              <Icon name="file" className="w-4 h-4" /> 議事録
            </h2>
            {minutes && (
              <button onClick={() => { navigator.clipboard.writeText(minutes); setToastMsg("議事録をコピーしました"); }} className="text-xs text-emerald-700 font-medium hover:underline">
                すべてコピー
              </button>
            )}
          </div>
          <div className="bg-emerald-50/50 rounded-xl border-2 border-dashed border-emerald-200 p-5 flex-1 overflow-y-auto thin-scrollbar">
            {!minutes ? (
              <div className="h-full flex flex-col items-center justify-center text-emerald-400/60 space-y-2">
                <p className="text-sm">「議事録作成」ボタンを押すと、AIが要約を開始します</p>
              </div>
            ) : (
              <div className="text-slate-700 text-sm whitespace-pre-wrap leading-loose minutes-content">
                {minutes}
              </div>
            )}
          </div>
        </section>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
